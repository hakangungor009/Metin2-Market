<!DOCTYPE html>

<head>

    <style>
        body {

            color: white;
            font-family: Arial;

        nav {

        nav a {

            display: flex;

            background-color: #2c2c2c;
            width: 250px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #000;
        }

        .urun:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }

        .siparis {
            background: gold;
            color: black;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
        }

        .siparis:hover {

        .iletisim {
